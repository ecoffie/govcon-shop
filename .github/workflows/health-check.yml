name: Daily Health Check

on:
  schedule:
    # Run daily at 8 AM EST (1 PM UTC)
    - cron: '0 13 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  health-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check Shop Pages
        id: shop
        run: |
          BASE_URL="https://shop.govcongiants.org"
          FAILED=0
          RESULTS=""

          # Critical product pages
          PAGES=(
            "/|Homepage"
            "/market-assassin|Market Assassin"
            "/content-reaper|Content Reaper"
            "/contractor-database-product|Contractor Database"
            "/expiring-contracts|Recompete Tracker"
            "/opportunity-hunter|Opportunity Hunter"
            "/sblo-directory|SBLO Directory"
            "/december-spend|December Spend"
            "/ai-prompts|AI Prompts"
            "/action-plan-2026|Action Plan"
            "/guides-templates|Guides Templates"
            "/tier2-directory|Tier-2 Directory"
            "/expiring-contracts-csv|Expiring CSV"
            "/tribal-list|Tribal List"
            "/bundles/starter|Starter Bundle"
            "/bundles/pro|Pro Bundle"
            "/bundles/ultimate|Ultimate Bundle"
            "/about|About"
            "/blog|Blog"
            "/free-resources|Free Resources"
            "/activate|Activate"
            "/api/health|API Health"
          )

          echo "## GovCon Health Check" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Shop Pages (shop.govcongiants.org)" >> $GITHUB_STEP_SUMMARY
          echo "| Page | Status | Response Time |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|---------------|" >> $GITHUB_STEP_SUMMARY

          for item in "${PAGES[@]}"; do
            path=$(echo "$item" | cut -d'|' -f1)
            name=$(echo "$item" | cut -d'|' -f2)
            url="${BASE_URL}${path}"

            response=$(curl -s -o /dev/null -w "%{http_code}|%{time_total}" "$url" --max-time 15 2>/dev/null || echo "000|0")
            status=$(echo "$response" | cut -d'|' -f1)
            time=$(echo "$response" | cut -d'|' -f2)

            if [ "$status" = "200" ]; then
              echo "| $name | ✅ $status | ${time}s |" >> $GITHUB_STEP_SUMMARY
            else
              echo "| $name | ❌ $status | ${time}s |" >> $GITHUB_STEP_SUMMARY
              FAILED=$((FAILED + 1))
              RESULTS="${RESULTS}[SHOP] ${name} (${path}): HTTP ${status}\n"
            fi
          done

          echo "" >> $GITHUB_STEP_SUMMARY

          echo "shop_failed=$FAILED" >> $GITHUB_OUTPUT
          if [ $FAILED -gt 0 ]; then
            echo "shop_results<<EOF" >> $GITHUB_OUTPUT
            echo -e "$RESULTS" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi

      - name: Check Funnel Pages
        id: funnels
        run: |
          BASE_URL="https://govcongiants.org"
          FAILED=0
          RESULTS=""

          # Funnel pages
          PAGES=(
            "/|Homepage"
            "/bootcamp|Bootcamp"
            "/surge|Surge Bootcamp"
            "/free-course|Free Course"
            "/opp|Opportunity Hunter Funnel"
            "/resources|Resources"
            "/training|Training Hub"
            "/premium|Premium Membership"
            "/dashboard|Dashboard"
            "/encore|Encore Funding"
            "/proposal-bootcamp|Proposal Bootcamp"
            "/proposal-bootcamp/2-upsell.html|PB Upsell"
            "/proposal-bootcamp/3-downsell.html|PB Downsell"
            "/proposal-bootcamp/4-thank-you.html|PB Thank You"
          )

          echo "### Funnel Pages (govcongiants.org)" >> $GITHUB_STEP_SUMMARY
          echo "| Page | Status | Response Time |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|---------------|" >> $GITHUB_STEP_SUMMARY

          for item in "${PAGES[@]}"; do
            path=$(echo "$item" | cut -d'|' -f1)
            name=$(echo "$item" | cut -d'|' -f2)
            url="${BASE_URL}${path}"

            response=$(curl -s -o /dev/null -w "%{http_code}|%{time_total}" "$url" --max-time 15 2>/dev/null || echo "000|0")
            status=$(echo "$response" | cut -d'|' -f1)
            time=$(echo "$response" | cut -d'|' -f2)

            if [ "$status" = "200" ]; then
              echo "| $name | ✅ $status | ${time}s |" >> $GITHUB_STEP_SUMMARY
            else
              echo "| $name | ❌ $status | ${time}s |" >> $GITHUB_STEP_SUMMARY
              FAILED=$((FAILED + 1))
              RESULTS="${RESULTS}[FUNNEL] ${name} (${path}): HTTP ${status}\n"
            fi
          done

          echo "" >> $GITHUB_STEP_SUMMARY

          echo "funnel_failed=$FAILED" >> $GITHUB_OUTPUT
          if [ $FAILED -gt 0 ]; then
            echo "funnel_results<<EOF" >> $GITHUB_OUTPUT
            echo -e "$RESULTS" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi

      - name: Check Shop Homepage Links
        id: shop_links
        run: |
          BASE_URL="https://shop.govcongiants.org"
          BROKEN_LINKS=""
          LINK_FAILURES=0

          echo "### Shop Homepage Links" >> $GITHUB_STEP_SUMMARY
          echo "| Link | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY

          # Fetch homepage and extract <a href="..."> links only
          HOMEPAGE_HTML=$(curl -s "$BASE_URL" --max-time 30)
          LINKS=$(echo "$HOMEPAGE_HTML" | grep -oE '<a[^>]+href="/[a-z][a-z0-9/-]*"' | grep -oE 'href="/[^"]*"' | sed 's/href="//g; s/"//g' | sort -u)

          for link in $LINKS; do
            # Skip images, static assets, API routes, and files with extensions
            if [[ "$link" == "/images"* ]] || [[ "$link" == "/api/"* ]] || [[ "$link" == "/_next/"* ]] || [[ "$link" == *".png"* ]] || [[ "$link" == *".jpg"* ]] || [[ "$link" == *".pdf"* ]] || [[ "$link" == *".csv"* ]] || [[ "$link" == *".html"* ]]; then
              continue
            fi

            # Skip very short links (likely parsing errors)
            if [ ${#link} -lt 4 ]; then
              continue
            fi

            url="${BASE_URL}${link}"
            status=$(curl -s -o /dev/null -w "%{http_code}" "$url" --max-time 10 2>/dev/null || echo "000")

            if [ "$status" = "200" ] || [ "$status" = "307" ] || [ "$status" = "308" ]; then
              echo "| $link | ✅ $status |" >> $GITHUB_STEP_SUMMARY
            else
              echo "| $link | ❌ $status |" >> $GITHUB_STEP_SUMMARY
              LINK_FAILURES=$((LINK_FAILURES + 1))
              BROKEN_LINKS="${BROKEN_LINKS}[SHOP] ${link}: HTTP ${status}\n"
            fi
          done

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "shop_link_failures=$LINK_FAILURES" >> $GITHUB_OUTPUT
          if [ $LINK_FAILURES -gt 0 ]; then
            echo "shop_broken_links<<EOF" >> $GITHUB_OUTPUT
            echo -e "$BROKEN_LINKS" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi

      - name: Check Funnel Homepage Links
        id: funnel_links
        run: |
          BASE_URL="https://govcongiants.org"
          BROKEN_LINKS=""
          LINK_FAILURES=0

          echo "### Funnel Homepage Links" >> $GITHUB_STEP_SUMMARY
          echo "| Link | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY

          # Fetch homepage and extract <a href="..."> links only
          HOMEPAGE_HTML=$(curl -s "$BASE_URL" --max-time 30)
          LINKS=$(echo "$HOMEPAGE_HTML" | grep -oE '<a[^>]+href="/[a-z][a-z0-9/-]*"' | grep -oE 'href="/[^"]*"' | sed 's/href="//g; s/"//g' | sort -u)

          for link in $LINKS; do
            # Skip images, static assets, API routes, and files with extensions
            if [[ "$link" == "/images"* ]] || [[ "$link" == "/api/"* ]] || [[ "$link" == "/_next/"* ]] || [[ "$link" == *".png"* ]] || [[ "$link" == *".jpg"* ]] || [[ "$link" == *".pdf"* ]] || [[ "$link" == *".csv"* ]] || [[ "$link" == *".html"* ]]; then
              continue
            fi

            # Skip very short links (likely parsing errors)
            if [ ${#link} -lt 4 ]; then
              continue
            fi

            url="${BASE_URL}${link}"
            status=$(curl -s -o /dev/null -w "%{http_code}" "$url" --max-time 10 2>/dev/null || echo "000")

            if [ "$status" = "200" ] || [ "$status" = "307" ] || [ "$status" = "308" ]; then
              echo "| $link | ✅ $status |" >> $GITHUB_STEP_SUMMARY
            else
              echo "| $link | ❌ $status |" >> $GITHUB_STEP_SUMMARY
              LINK_FAILURES=$((LINK_FAILURES + 1))
              BROKEN_LINKS="${BROKEN_LINKS}[FUNNEL] ${link}: HTTP ${status}\n"
            fi
          done

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "funnel_link_failures=$LINK_FAILURES" >> $GITHUB_OUTPUT
          if [ $LINK_FAILURES -gt 0 ]; then
            echo "funnel_broken_links<<EOF" >> $GITHUB_OUTPUT
            echo -e "$BROKEN_LINKS" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi

      - name: Check Product Page Links
        id: product_links
        run: |
          BASE_URL="https://shop.govcongiants.org"
          PRODUCT_BROKEN=""
          PRODUCT_FAILURES=0

          # Key product pages to check links on
          PRODUCT_PAGES=(
            "/market-assassin"
            "/content-reaper"
            "/contractor-database-product"
            "/expiring-contracts"
          )

          echo "### Product Page Link Verification" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          for page in "${PRODUCT_PAGES[@]}"; do
            echo "**Checking $page**" >> $GITHUB_STEP_SUMMARY

            PAGE_HTML=$(curl -s "${BASE_URL}${page}" --max-time 30)
            # Extract only <a href="..."> links, not src or other attributes
            # Match href="/path" where path is a valid route (not images, not fragments)
            LINKS=$(echo "$PAGE_HTML" | grep -oE '<a[^>]+href="/[a-z][a-z0-9/-]*"' | grep -oE 'href="/[^"]*"' | sed 's/href="//g; s/"//g' | sort -u)

            FOUND_ISSUES=0
            for link in $LINKS; do
              # Skip static assets, images, API routes, and any path with file extensions
              if [[ "$link" == "/images"* ]] || [[ "$link" == "/api/"* ]] || [[ "$link" == "/_next/"* ]] || [[ "$link" == *".png"* ]] || [[ "$link" == *".jpg"* ]] || [[ "$link" == *".ico"* ]] || [[ "$link" == *".pdf"* ]] || [[ "$link" == *".csv"* ]] || [[ "$link" == *".html"* ]]; then
                continue
              fi

              # Skip very short links that are likely parsing errors
              if [ ${#link} -lt 4 ]; then
                continue
              fi

              url="${BASE_URL}${link}"
              status=$(curl -s -o /dev/null -w "%{http_code}" "$url" --max-time 10 2>/dev/null || echo "000")

              if [ "$status" != "200" ] && [ "$status" != "307" ] && [ "$status" != "308" ]; then
                echo "- ❌ $link → HTTP $status" >> $GITHUB_STEP_SUMMARY
                PRODUCT_FAILURES=$((PRODUCT_FAILURES + 1))
                PRODUCT_BROKEN="${PRODUCT_BROKEN}${page} → ${link}: HTTP ${status}\n"
                FOUND_ISSUES=1
              fi
            done

            if [ $FOUND_ISSUES -eq 0 ]; then
              echo "- ✅ All links valid" >> $GITHUB_STEP_SUMMARY
            fi
          done

          echo "" >> $GITHUB_STEP_SUMMARY

          if [ $PRODUCT_FAILURES -gt 0 ]; then
            echo "product_failures=$PRODUCT_FAILURES" >> $GITHUB_OUTPUT
            echo "product_broken<<EOF" >> $GITHUB_OUTPUT
            echo -e "$PRODUCT_BROKEN" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "✅ All product page links valid" >> $GITHUB_STEP_SUMMARY
            echo "product_failures=0" >> $GITHUB_OUTPUT
          fi

      - name: Determine Overall Status
        id: overall
        run: |
          SHOP_PAGES=${{ steps.shop.outputs.shop_failed || 0 }}
          FUNNEL_PAGES=${{ steps.funnels.outputs.funnel_failed || 0 }}
          SHOP_LINKS=${{ steps.shop_links.outputs.shop_link_failures || 0 }}
          FUNNEL_LINKS=${{ steps.funnel_links.outputs.funnel_link_failures || 0 }}
          PRODUCT_LINKS=${{ steps.product_links.outputs.product_failures || 0 }}

          TOTAL_ISSUES=$((SHOP_PAGES + FUNNEL_PAGES + SHOP_LINKS + FUNNEL_LINKS + PRODUCT_LINKS))

          echo "total_issues=$TOTAL_ISSUES" >> $GITHUB_OUTPUT
          echo "shop_pages=$SHOP_PAGES" >> $GITHUB_OUTPUT
          echo "funnel_pages=$FUNNEL_PAGES" >> $GITHUB_OUTPUT
          echo "shop_links=$SHOP_LINKS" >> $GITHUB_OUTPUT
          echo "funnel_links=$FUNNEL_LINKS" >> $GITHUB_OUTPUT
          echo "product_links=$PRODUCT_LINKS" >> $GITHUB_OUTPUT

          if [ $TOTAL_ISSUES -gt 0 ]; then
            echo "has_issues=true" >> $GITHUB_OUTPUT
            echo "### ❌ Total Issues: $TOTAL_ISSUES" >> $GITHUB_STEP_SUMMARY
          else
            echo "has_issues=false" >> $GITHUB_OUTPUT
            echo "### ✅ All checks passed!" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Send Slack Alert on Failure
        if: steps.overall.outputs.has_issues == 'true'
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_HEALTH_WEBHOOK_URL }}
        run: |
          if [ -n "$SLACK_WEBHOOK" ]; then
            curl -X POST "$SLACK_WEBHOOK" \
              -H "Content-Type: application/json" \
              -d "{
                \"text\": \"🚨 GovCon Health Check Failed\",
                \"blocks\": [
                  {
                    \"type\": \"header\",
                    \"text\": {
                      \"type\": \"plain_text\",
                      \"text\": \"🚨 GovCon Health Check Failed\"
                    }
                  },
                  {
                    \"type\": \"section\",
                    \"text\": {
                      \"type\": \"mrkdwn\",
                      \"text\": \"*${{ steps.overall.outputs.total_issues }} issues found*\"
                    }
                  },
                  {
                    \"type\": \"section\",
                    \"fields\": [
                      {\"type\": \"mrkdwn\", \"text\": \"*Shop Pages:* ${{ steps.overall.outputs.shop_pages }}\"},
                      {\"type\": \"mrkdwn\", \"text\": \"*Funnel Pages:* ${{ steps.overall.outputs.funnel_pages }}\"},
                      {\"type\": \"mrkdwn\", \"text\": \"*Shop Links:* ${{ steps.overall.outputs.shop_links }}\"},
                      {\"type\": \"mrkdwn\", \"text\": \"*Funnel Links:* ${{ steps.overall.outputs.funnel_links }}\"},
                      {\"type\": \"mrkdwn\", \"text\": \"*Product Links:* ${{ steps.overall.outputs.product_links }}\"}
                    ]
                  },
                  {
                    \"type\": \"actions\",
                    \"elements\": [
                      {
                        \"type\": \"button\",
                        \"text\": {\"type\": \"plain_text\", \"text\": \"View Report\"},
                        \"url\": \"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"
                      },
                      {
                        \"type\": \"button\",
                        \"text\": {\"type\": \"plain_text\", \"text\": \"Shop\"},
                        \"url\": \"https://shop.govcongiants.org\"
                      },
                      {
                        \"type\": \"button\",
                        \"text\": {\"type\": \"plain_text\", \"text\": \"Funnels\"},
                        \"url\": \"https://govcongiants.org\"
                      }
                    ]
                  }
                ]
              }"
          fi

      - name: Fail workflow if issues found
        if: steps.overall.outputs.has_issues == 'true'
        run: |
          echo "❌ Health check found ${{ steps.overall.outputs.total_issues }} issues"
          echo ""
          echo "Shop Pages Down: ${{ steps.overall.outputs.shop_pages }}"
          echo "Funnel Pages Down: ${{ steps.overall.outputs.funnel_pages }}"
          echo "Shop Broken Links: ${{ steps.overall.outputs.shop_links }}"
          echo "Funnel Broken Links: ${{ steps.overall.outputs.funnel_links }}"
          echo "Product Page Links: ${{ steps.overall.outputs.product_links }}"
          exit 1
