name: Daily Health Check

on:
  schedule:
    # Run daily at 8 AM EST (1 PM UTC)
    - cron: '0 13 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  health-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Health Check
        id: health
        run: |
          BASE_URL="https://shop.govcongiants.org"
          FAILED=0
          RESULTS=""
          BROKEN_LINKS=""

          # Critical product pages
          PAGES=(
            "/|Homepage"
            "/market-assassin|Market Assassin"
            "/content-reaper|Content Reaper"
            "/contractor-database-product|Contractor Database"
            "/expiring-contracts|Recompete Tracker"
            "/opportunity-hunter|Opportunity Hunter"
            "/sblo-directory|SBLO Directory"
            "/december-spend|December Spend"
            "/ai-prompts|AI Prompts"
            "/action-plan-2026|Action Plan"
            "/guides-templates|Guides Templates"
            "/tier2-directory|Tier-2 Directory"
            "/expiring-contracts-csv|Expiring CSV"
            "/tribal-list|Tribal List"
            "/bundles/starter|Starter Bundle"
            "/bundles/pro|Pro Bundle"
            "/bundles/ultimate|Ultimate Bundle"
            "/about|About"
            "/blog|Blog"
            "/free-resources|Free Resources"
            "/activate|Activate"
            "/api/health|API Health"
          )

          echo "## GovCon Shop Health Check" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Page Status" >> $GITHUB_STEP_SUMMARY
          echo "| Page | Status | Response Time |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|---------------|" >> $GITHUB_STEP_SUMMARY

          for item in "${PAGES[@]}"; do
            path=$(echo "$item" | cut -d'|' -f1)
            name=$(echo "$item" | cut -d'|' -f2)
            url="${BASE_URL}${path}"

            response=$(curl -s -o /dev/null -w "%{http_code}|%{time_total}" "$url" --max-time 15 2>/dev/null || echo "000|0")
            status=$(echo "$response" | cut -d'|' -f1)
            time=$(echo "$response" | cut -d'|' -f2)

            if [ "$status" = "200" ]; then
              echo "| $name | âś… $status | ${time}s |" >> $GITHUB_STEP_SUMMARY
            else
              echo "| $name | âťŚ $status | ${time}s |" >> $GITHUB_STEP_SUMMARY
              FAILED=$((FAILED + 1))
              RESULTS="${RESULTS}${name} (${path}): HTTP ${status}\n"
            fi
          done

          echo "" >> $GITHUB_STEP_SUMMARY

      - name: Check Homepage Links
        id: links
        run: |
          BASE_URL="https://shop.govcongiants.org"
          BROKEN_LINKS=""
          LINK_FAILURES=0

          echo "### Homepage Link Verification" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Fetch homepage and extract internal links
          HOMEPAGE_HTML=$(curl -s "$BASE_URL" --max-time 30)

          # Extract href links (internal only, starting with /)
          LINKS=$(echo "$HOMEPAGE_HTML" | grep -oE 'href="/[^"#]*"' | sed 's/href="//g; s/"//g' | sort -u)

          echo "| Link | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY

          for link in $LINKS; do
            # Skip static assets, API routes, and anchors
            if [[ "$link" == *".ico"* ]] || [[ "$link" == *".png"* ]] || [[ "$link" == *".jpg"* ]] || [[ "$link" == *".css"* ]] || [[ "$link" == *".js"* ]] || [[ "$link" == "/api/"* ]] || [[ "$link" == "/_next/"* ]]; then
              continue
            fi

            url="${BASE_URL}${link}"
            status=$(curl -s -o /dev/null -w "%{http_code}" "$url" --max-time 10 2>/dev/null || echo "000")

            if [ "$status" = "200" ] || [ "$status" = "307" ] || [ "$status" = "308" ]; then
              echo "| $link | âś… $status |" >> $GITHUB_STEP_SUMMARY
            else
              echo "| $link | âťŚ $status |" >> $GITHUB_STEP_SUMMARY
              LINK_FAILURES=$((LINK_FAILURES + 1))
              BROKEN_LINKS="${BROKEN_LINKS}${link}: HTTP ${status}\n"
            fi
          done

          echo "" >> $GITHUB_STEP_SUMMARY

          if [ $LINK_FAILURES -gt 0 ]; then
            echo "### âťŚ $LINK_FAILURES broken links found" >> $GITHUB_STEP_SUMMARY
            echo "link_failures=$LINK_FAILURES" >> $GITHUB_OUTPUT
            echo "broken_links<<EOF" >> $GITHUB_OUTPUT
            echo -e "$BROKEN_LINKS" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "### âś… All homepage links valid" >> $GITHUB_STEP_SUMMARY
            echo "link_failures=0" >> $GITHUB_OUTPUT
          fi

      - name: Check Product Page Links
        id: product_links
        run: |
          BASE_URL="https://shop.govcongiants.org"
          PRODUCT_BROKEN=""
          PRODUCT_FAILURES=0

          # Key product pages to check links on
          PRODUCT_PAGES=(
            "/market-assassin"
            "/content-reaper"
            "/contractor-database-product"
            "/expiring-contracts"
          )

          echo "### Product Page Link Verification" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          for page in "${PRODUCT_PAGES[@]}"; do
            echo "**Checking $page**" >> $GITHUB_STEP_SUMMARY

            PAGE_HTML=$(curl -s "${BASE_URL}${page}" --max-time 30)
            LINKS=$(echo "$PAGE_HTML" | grep -oE 'href="/[^"#]*"' | sed 's/href="//g; s/"//g' | sort -u)

            for link in $LINKS; do
              # Skip static assets
              if [[ "$link" == *".ico"* ]] || [[ "$link" == *".png"* ]] || [[ "$link" == *".jpg"* ]] || [[ "$link" == "/api/"* ]] || [[ "$link" == "/_next/"* ]]; then
                continue
              fi

              url="${BASE_URL}${link}"
              status=$(curl -s -o /dev/null -w "%{http_code}" "$url" --max-time 10 2>/dev/null || echo "000")

              if [ "$status" != "200" ] && [ "$status" != "307" ] && [ "$status" != "308" ]; then
                echo "- âťŚ $link â†’ HTTP $status" >> $GITHUB_STEP_SUMMARY
                PRODUCT_FAILURES=$((PRODUCT_FAILURES + 1))
                PRODUCT_BROKEN="${PRODUCT_BROKEN}${page} â†’ ${link}: HTTP ${status}\n"
              fi
            done
          done

          echo "" >> $GITHUB_STEP_SUMMARY

          if [ $PRODUCT_FAILURES -gt 0 ]; then
            echo "product_failures=$PRODUCT_FAILURES" >> $GITHUB_OUTPUT
            echo "product_broken<<EOF" >> $GITHUB_OUTPUT
            echo -e "$PRODUCT_BROKEN" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "âś… All product page links valid" >> $GITHUB_STEP_SUMMARY
            echo "product_failures=0" >> $GITHUB_OUTPUT
          fi

      - name: Determine Overall Status
        id: overall
        run: |
          PAGE_FAILED=${{ steps.health.outputs.failed_count || 0 }}
          LINK_FAILED=${{ steps.links.outputs.link_failures || 0 }}
          PRODUCT_FAILED=${{ steps.product_links.outputs.product_failures || 0 }}

          TOTAL_ISSUES=$((PAGE_FAILED + LINK_FAILED + PRODUCT_FAILED))

          echo "total_issues=$TOTAL_ISSUES" >> $GITHUB_OUTPUT

          if [ $TOTAL_ISSUES -gt 0 ]; then
            echo "has_issues=true" >> $GITHUB_OUTPUT
          else
            echo "has_issues=false" >> $GITHUB_OUTPUT
          fi

      - name: Send Slack Alert on Failure
        if: steps.overall.outputs.has_issues == 'true'
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_HEALTH_WEBHOOK_URL }}
        run: |
          if [ -n "$SLACK_WEBHOOK" ]; then
            # Build issue summary
            ISSUES=""

            if [ "${{ steps.health.outputs.failed_count || 0 }}" -gt 0 ]; then
              ISSUES="${ISSUES}*Pages Down:*\n\`\`\`${{ steps.health.outputs.failed_pages }}\`\`\`\n"
            fi

            if [ "${{ steps.links.outputs.link_failures || 0 }}" -gt 0 ]; then
              ISSUES="${ISSUES}*Broken Homepage Links:*\n\`\`\`${{ steps.links.outputs.broken_links }}\`\`\`\n"
            fi

            if [ "${{ steps.product_links.outputs.product_failures || 0 }}" -gt 0 ]; then
              ISSUES="${ISSUES}*Broken Product Page Links:*\n\`\`\`${{ steps.product_links.outputs.product_broken }}\`\`\`\n"
            fi

            curl -X POST "$SLACK_WEBHOOK" \
              -H "Content-Type: application/json" \
              -d "{
                \"text\": \"đźš¨ GovCon Shop Health Check Failed\",
                \"blocks\": [
                  {
                    \"type\": \"header\",
                    \"text\": {
                      \"type\": \"plain_text\",
                      \"text\": \"đźš¨ GovCon Shop Health Check Failed\"
                    }
                  },
                  {
                    \"type\": \"section\",
                    \"fields\": [
                      {\"type\": \"mrkdwn\", \"text\": \"*Pages Down:* ${{ steps.health.outputs.failed_count || 0 }}\"},
                      {\"type\": \"mrkdwn\", \"text\": \"*Broken Links:* ${{ steps.links.outputs.link_failures || 0 }}\"},
                      {\"type\": \"mrkdwn\", \"text\": \"*Product Link Issues:* ${{ steps.product_links.outputs.product_failures || 0 }}\"}
                    ]
                  },
                  {
                    \"type\": \"actions\",
                    \"elements\": [
                      {
                        \"type\": \"button\",
                        \"text\": {\"type\": \"plain_text\", \"text\": \"View Details\"},
                        \"url\": \"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"
                      },
                      {
                        \"type\": \"button\",
                        \"text\": {\"type\": \"plain_text\", \"text\": \"View Shop\"},
                        \"url\": \"https://shop.govcongiants.org\"
                      }
                    ]
                  }
                ]
              }"
          fi

      - name: Fail workflow if issues found
        if: steps.overall.outputs.has_issues == 'true'
        run: |
          echo "âťŚ Health check found ${{ steps.overall.outputs.total_issues }} issues"
          exit 1
